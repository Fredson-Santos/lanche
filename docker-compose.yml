services:
  db:
    image: postgres:16-alpine
    container_name: lanche-db
    restart: always
    environment:
      POSTGRES_USER: lanche_user
      POSTGRES_PASSWORD: lanche_pass
      POSTGRES_DB: lanche_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - lanche-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanche-backend
    command: /bin/bash scripts/start.sh
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql://lanche_user:lanche_pass@db:5432/lanche_db
      SECRET_KEY: dev-secret-key-change-in-prod
    volumes:
      - ./backend:/app
    networks:
      - lanche-network
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lanche-frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - lanche-network

networks:
  lanche-network:
    driver: bridge

volumes:
  postgres_data:


version: '3.8'

services:
  db:
    image: postgres:16
    container_name: lanche-db
    environment:
      POSTGRES_DB: lanche_db
      POSTGRES_USER: lanche
      POSTGRES_PASSWORD: lanche123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lanche-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanche-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://lanche:lanche123@db:5432/lanche_db
      SECRET_KEY: dev-secret-key-change-in-prod
    volumes:
      - ./backend:/app
    depends_on:
      - db
    networks:
      - lanche-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lanche-frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - lanche-network

volumes:
  postgres_data:

networks:
  lanche-network:
    driver: bridge

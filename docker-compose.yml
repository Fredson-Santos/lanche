services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanche-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8008 --reload
    ports:
      - "8008:8008"
    environment:
      SECRET_KEY: dev-secret-key-change-in-prod
    volumes:
      - ./backend:/app
    networks:
      - lanche-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lanche-frontend
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - lanche-network

networks:
  lanche-network:
    driver: bridge

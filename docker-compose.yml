version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lanche-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-key-change-in-prod
    volumes:
      - ./backend:/app
    networks:
      - lanche-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lanche-frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - lanche-network

networks:
  lanche-network:
    driver: bridge
